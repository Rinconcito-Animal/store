<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Rinconcito Animal</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="signup-page">
    <header>
        <a href="./index.html" class="logo-container">
            <div class="logo-img"><img src="./assets/Rinconcito-Animal.png" alt="Rinconcito Animal Logo">
            </div>
        </a>
        <nav>
            <ul style="display: flex; align-items: center;">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./shop.html">Tienda</a></li>
            </ul>
        </nav>
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <main class="signup-container">
        <div class="signup-card">
            <h1>Bienvenido de nuevo</h1>
            <p class="subtitle">Ingresa a tu cuenta para gestionar tus mascotas y compras</p>

            <!-- Email Login Form -->
            <form id="email-login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <div class="password-input-container">
                        <input type="password" id="login-password" placeholder="Tu contraseña" required>
                        <button type="button" id="toggle-login-password" class="toggle-password"
                            aria-label="Mostrar contraseña">
                            <span class="icon">👁️</span>
                        </button>
                    </div>
                </div>

                <div id="login-error" class="hidden"
                    style="color: #ff4d4d; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
                </div>

                <button type="submit" id="login-email-btn" class="btn-primary">Ingresar</button>
            </form>

            <p class="auth-footer">¿Aún no tienes cuenta? <a href="/signup.html">Regístrate aquí</a></p>
        </div>
    </main>

    <script type="module" src="/src/login.js"></script>
</body>

</html>
